name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v

      - name: Run deterministic demo validation
        shell: bash
        run: |
          mkdir -p artifacts
          python app.py > server.log 2>&1 &
          server_pid=$!
          trap "kill $server_pid 2>/dev/null || true" EXIT

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/health; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:5000/health
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/demo_validation.ps1 -BaseUrl http://127.0.0.1:5000 -ReportPath artifacts/demo-validation.json

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sias-validation-evidence
          path: |
            artifacts/demo-validation.json
            server.log
